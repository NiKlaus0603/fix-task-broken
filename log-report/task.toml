artifacts = ["/app/report.json"]

[task]
name = "dynamo/log-report"
description = "Parse an Apache-style access log into a JSON summary report."

[metadata]
category = "data_processing_and_etl"
subcategory = "text_processing"
task_objective = ["analyze", "transform", "generate", "validate"]
artifact_type = ["text_or_log_file", "generated_output_artifact"]
expert_time_estimate_hours = 0.3
model_tested = "GPT-5.4"
agent_tested = "Terminus-2"
difficulty_explanation = "The task is straightforward log parsing with a small JSON output, but requires careful handling of request lines and deterministic top-path selection."
solution_explanation = "Read /app/access.log, count non-empty request lines, count distinct client IP addresses, count request paths, and write /app/report.json with total_requests, unique_ips, and top_path."
verification_explanation = "The verifier independently parses /app/access.log and compares the produced /app/report.json against the expected total request count, unique IP count, and most frequent path."

[verifier]
timeout_sec = 120.0

[agent]
timeout_sec = 120.0

[environment]
build_timeout_sec = 600.0
cpus = 1
memory_mb = 2048
storage_mb = 10240
gpus = 0
allow_internet = false
mcp_servers = []
